name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 24

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    - name: Run Backend DB Initializer
      run: |
        cd backend
        node -e "require('./db/index.js')"

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: Build Frontend React Code
      run: |
        cd frontend
        npm run build
